version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:4000:4000"
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

  app:
    image: ghcr.io/kamil-k-prog/my-website:latest